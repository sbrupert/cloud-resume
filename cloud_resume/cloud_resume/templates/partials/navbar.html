<script>
  (() => {
    const THEME_KEY = "theme-preference";
    const VALID_THEMES = new Set(["system", "light", "dark"]);

    const normalizeTheme = (value) => (VALID_THEMES.has(value) ? value : "system");

    let savedTheme = "system";
    try {
      savedTheme = normalizeTheme(window.localStorage.getItem(THEME_KEY));
    } catch (error) {
      savedTheme = "system";
    }

    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const resolvedTheme =
      savedTheme === "system" ? (prefersDark ? "dark" : "light") : savedTheme;

    document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
    document.documentElement.dataset.themePreference = savedTheme;
    document.documentElement.dataset.theme = resolvedTheme;
  })();
</script>

<script>
  (() => {
    const THEME_KEY = "theme-preference";
    const VALID_THEMES = new Set(["system", "light", "dark"]);
    const THEME_META = {
      system: { icon: "brightness_auto", label: "Theme: System" },
      light: { icon: "light_mode", label: "Theme: Light" },
      dark: { icon: "dark_mode", label: "Theme: Dark" },
    };

    const normalizeTheme = (value) => (VALID_THEMES.has(value) ? value : "system");

    const root = document.documentElement;
    const systemThemeMedia = window.matchMedia("(prefers-color-scheme: dark)");

    const readStoredTheme = () => {
      try {
        return normalizeTheme(window.localStorage.getItem(THEME_KEY));
      } catch (error) {
        return "system";
      }
    };

    const writeStoredTheme = (theme) => {
      try {
        window.localStorage.setItem(THEME_KEY, normalizeTheme(theme));
      } catch (error) {
        // localStorage may be blocked; ignore and keep runtime-only preference.
      }
    };

    const resolveTheme = (themePreference) => {
      if (themePreference === "system") {
        return systemThemeMedia.matches ? "dark" : "light";
      }
      return themePreference;
    };

    const applyTheme = (themePreference) => {
      const resolvedTheme = resolveTheme(themePreference);
      root.classList.toggle("dark", resolvedTheme === "dark");
      root.dataset.theme = resolvedTheme;
      root.dataset.themePreference = themePreference;
    };

    const mobileToggleButton = document.getElementById("mobile-nav-toggle");
    const mobileMenu = document.getElementById("mobile-nav-menu");
    const mobileMenuIcon = mobileToggleButton?.querySelector("[data-mobile-nav-icon]");
    const mobileMenuLinks = mobileMenu?.querySelectorAll("[data-mobile-nav-link]") ?? [];
    const desktopNavMedia = window.matchMedia("(min-width: 768px)");

    const themeToggleButtons = Array.from(document.querySelectorAll("[data-theme-menu-toggle]"));
    const themeMenus = Array.from(document.querySelectorAll("[data-theme-menu]"));
    const themeOptions = Array.from(document.querySelectorAll("[data-theme-option]"));
    const themeIcons = Array.from(document.querySelectorAll("[data-theme-current-icon]"));
    const themeLabels = Array.from(document.querySelectorAll("[data-theme-current-label]"));

    let themePreference = normalizeTheme(root.dataset.themePreference || readStoredTheme());

    const setMobileMenuState = (isOpen) => {
      if (!mobileToggleButton || !mobileMenu) {
        return;
      }
      mobileToggleButton.setAttribute("aria-expanded", String(isOpen));
      mobileMenu.classList.toggle("hidden", !isOpen);
      if (mobileMenuIcon) {
        mobileMenuIcon.textContent = isOpen ? "close" : "menu";
      }
    };

    const closeThemeMenus = () => {
      themeToggleButtons.forEach((button) => button.setAttribute("aria-expanded", "false"));
      themeMenus.forEach((menu) => menu.classList.add("hidden"));
    };

    const syncThemeMenuState = () => {
      const meta = THEME_META[themePreference] || THEME_META.system;

      themeIcons.forEach((icon) => {
        icon.textContent = meta.icon;
      });

      themeLabels.forEach((label) => {
        label.textContent = meta.label;
      });

      themeOptions.forEach((option) => {
        const optionTheme = normalizeTheme(option.dataset.themeOption);
        const isSelected = optionTheme === themePreference;
        option.setAttribute("aria-checked", String(isSelected));
        option.dataset.selected = String(isSelected);
        option.querySelector("[data-theme-check]")?.classList.toggle("opacity-0", !isSelected);
      });
    };

    const setThemePreference = (nextTheme) => {
      themePreference = normalizeTheme(nextTheme);
      writeStoredTheme(themePreference);
      applyTheme(themePreference);
      syncThemeMenuState();
      closeThemeMenus();
    };

    const focusFirstMenuOption = (menu) => {
      const selectedOption = menu.querySelector('[data-theme-option][aria-checked="true"]');
      const firstOption = menu.querySelector("[data-theme-option]");
      (selectedOption || firstOption)?.focus();
    };

    const toggleThemeMenu = (button, menu) => {
      const isOpen = button.getAttribute("aria-expanded") === "true";
      closeThemeMenus();
      if (!isOpen) {
        button.setAttribute("aria-expanded", "true");
        menu.classList.remove("hidden");
        focusFirstMenuOption(menu);
      }
    };

    const handleThemeMenuKeyboard = (event, menu, button) => {
      const options = Array.from(menu.querySelectorAll("[data-theme-option]"));
      if (!options.length) {
        return;
      }

      const currentIndex = options.indexOf(document.activeElement);

      if (event.key === "Escape") {
        event.preventDefault();
        closeThemeMenus();
        button.focus();
        return;
      }

      if (event.key === "ArrowDown" || event.key === "ArrowUp") {
        event.preventDefault();
        const direction = event.key === "ArrowDown" ? 1 : -1;
        const safeIndex = currentIndex >= 0 ? currentIndex : 0;
        const nextIndex = (safeIndex + direction + options.length) % options.length;
        options[nextIndex].focus();
        return;
      }

      if (event.key === "Home") {
        event.preventDefault();
        options[0].focus();
        return;
      }

      if (event.key === "End") {
        event.preventDefault();
        options[options.length - 1].focus();
      }
    };

    themeToggleButtons.forEach((button) => {
      const targetMenuId = button.getAttribute("aria-controls");
      const targetMenu = targetMenuId ? document.getElementById(targetMenuId) : null;

      if (!targetMenu) {
        return;
      }

      button.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleThemeMenu(button, targetMenu);
      });

      button.addEventListener("keydown", (event) => {
        if (!["Enter", " ", "ArrowDown"].includes(event.key)) {
          return;
        }
        event.preventDefault();
        if (button.getAttribute("aria-expanded") !== "true") {
          toggleThemeMenu(button, targetMenu);
        } else {
          focusFirstMenuOption(targetMenu);
        }
      });

      targetMenu.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      targetMenu.addEventListener("keydown", (event) => {
        handleThemeMenuKeyboard(event, targetMenu, button);
      });
    });

    themeOptions.forEach((option) => {
      option.addEventListener("click", () => {
        setThemePreference(option.dataset.themeOption || "system");
      });
    });

    if (mobileToggleButton && mobileMenu) {
      mobileToggleButton.addEventListener("click", () => {
        const isOpen = mobileToggleButton.getAttribute("aria-expanded") === "true";
        setMobileMenuState(!isOpen);
      });

      mobileMenuLinks.forEach((link) => {
        link.addEventListener("click", () => setMobileMenuState(false));
      });

      const syncDesktopState = (event) => {
        if (!event.matches) {
          return;
        }
        setMobileMenuState(false);
      };

      if (typeof desktopNavMedia.addEventListener === "function") {
        desktopNavMedia.addEventListener("change", syncDesktopState);
      } else {
        desktopNavMedia.addListener(syncDesktopState);
      }
    }

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") {
        return;
      }
      closeThemeMenus();
      setMobileMenuState(false);
    });

    document.addEventListener("click", (event) => {
      const clickedInsideThemeControl =
        event.target.closest("[data-theme-menu-root]") !== null;

      if (!clickedInsideThemeControl) {
        closeThemeMenus();
      }

      if (!mobileMenu || mobileMenu.classList.contains("hidden")) {
        return;
      }
      if (mobileToggleButton?.contains(event.target) || mobileMenu.contains(event.target)) {
        return;
      }
      setMobileMenuState(false);
    });

    const handleSystemThemeChange = () => {
      if (themePreference !== "system") {
        return;
      }
      applyTheme("system");
      syncThemeMenuState();
    };

    if (typeof systemThemeMedia.addEventListener === "function") {
      systemThemeMedia.addEventListener("change", handleSystemThemeChange);
    } else {
      systemThemeMedia.addListener(handleSystemThemeChange);
    }

    applyTheme(themePreference);
    syncThemeMenuState();
    closeThemeMenus();
    setMobileMenuState(false);
  })();
</script>
