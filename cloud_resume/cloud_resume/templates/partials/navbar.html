  >
    <div class="flex items-center gap-2 sm:gap-3 min-w-0">
      <div

      >

      </div>
      <span
        class="inline-flex items-center rounded-[999px] border border-[#c3c6d7]/60 bg-[#dbe1ff] px-2 py-0.5 sm:px-2.5 sm:py-1 font-['Inter'] text-[10px] sm:text-xs font-bold uppercase tracking-[0.12em] sm:tracking-[0.16em] leading-none text-[#003ea8]"
      >
        {{ site_version }}
      </span>
    </div>
    <div class="hidden md:flex items-center gap-8">
      <a
        class="font-['Inter'] text-sm font-medium tracking-tight {% if active_nav == 'resume' %}text-[#1d4ed8] border-b-2 border-[#1d4ed8] pb-1{% else %}text-[#64748b] hover:text-[#1d4ed8] transition-colors{% endif %}"
        href="/"
      >
        Resume
      </a>
      <a
        class="font-['Inter'] text-sm font-medium tracking-tight {% if active_nav == 'project_overview' %}text-[#1d4ed8] border-b-2 border-[#1d4ed8] pb-1{% else %}text-[#64748b] hover:text-[#1d4ed8] transition-colors{% endif %}"
        href="/project_overview"
      >
        Project Overview
      </a>
    </div>
    <a
      class="hidden md:inline-flex bg-[#004ac6] text-white px-4 py-2 text-sm font-['Inter'] font-semibold rounded-[4px] hover:opacity-85 transition-opacity active:scale-95"
      href="https://github.com/sbrupert/cloud-resume"
      target="_blank"
      rel="noopener noreferrer"
    >
      View GitHub Repo
    </a>
    <button
      id="mobile-nav-toggle"
      type="button"
      class="md:hidden inline-flex items-center justify-center rounded-[4px] border border-[#c3c6d7]/60 bg-white/80 p-2 text-[#1d4ed8] hover:bg-[#dbe1ff] transition-colors"
      aria-expanded="false"
      aria-controls="mobile-nav-menu"
      aria-label="Toggle navigation menu"
    >
      <span class="material-symbols-outlined text-[20px]" data-mobile-nav-icon
        >menu</span
      >
    </button>
  </div>
  <div id="mobile-nav-menu" class="md:hidden hidden border-t border-[#c3c6d7]/35">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col gap-2">
      <a
        data-mobile-nav-link
        class="rounded-md px-3 py-2 font-['Inter'] text-sm font-semibold tracking-tight {% if active_nav == 'resume' %}bg-[#dbe1ff] text-[#003ea8]{% else %}text-[#434655] hover:bg-[#eff4ff] hover:text-[#1d4ed8]{% endif %}"
        href="/"
      >
        Resume
      </a>
      <a
        data-mobile-nav-link
        class="rounded-md px-3 py-2 font-['Inter'] text-sm font-semibold tracking-tight {% if active_nav == 'project_overview' %}bg-[#dbe1ff] text-[#003ea8]{% else %}text-[#434655] hover:bg-[#eff4ff] hover:text-[#1d4ed8]{% endif %}"

</nav>
<script>
  (() => {
    const toggleButton = document.getElementById("mobile-nav-toggle");
    const mobileMenu = document.getElementById("mobile-nav-menu");
    if (!toggleButton || !mobileMenu) {
      return;
    }

    const mobileMenuIcon = toggleButton.querySelector("[data-mobile-nav-icon]");
    const mobileMenuLinks = mobileMenu.querySelectorAll("[data-mobile-nav-link]");
    const desktopNavMedia = window.matchMedia("(min-width: 768px)");

    const setMobileMenuState = (isOpen) => {
      toggleButton.setAttribute("aria-expanded", String(isOpen));
      mobileMenu.classList.toggle("hidden", !isOpen);
      if (mobileMenuIcon) {
        mobileMenuIcon.textContent = isOpen ? "close" : "menu";
      }
    };

    toggleButton.addEventListener("click", () => {
      const isOpen = toggleButton.getAttribute("aria-expanded") === "true";
      setMobileMenuState(!isOpen);
    });

    mobileMenuLinks.forEach((link) => {
      link.addEventListener("click", () => setMobileMenuState(false));
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") {
        return;
      }
      setMobileMenuState(false);
    });

    document.addEventListener("click", (event) => {
      if (mobileMenu.classList.contains("hidden")) {
        return;
      }
      if (toggleButton.contains(event.target) || mobileMenu.contains(event.target)) {
        return;
      }
      setMobileMenuState(false);
    });

    const syncDesktopState = (event) => {
      if (!event.matches) {
        return;
      }
      setMobileMenuState(false);
    };

    if (typeof desktopNavMedia.addEventListener === "function") {
      desktopNavMedia.addEventListener("change", syncDesktopState);
    } else {
      desktopNavMedia.addListener(syncDesktopState);
    }
  })();
</script>
